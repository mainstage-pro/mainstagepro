<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Mainstage Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #B3985B; font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #666; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #B3985B;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #c9a96a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet. Cuando te reconectes, todos tus cambios pendientes se sincronizarán automáticamente.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
